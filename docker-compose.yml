services:
  mysql:
    image: mysql:8
    container_name: ai_mysql
    environment:
      MYSQL_ROOT_PASSWORD: Ashan05@
      MYSQL_DATABASE: ai_code_review
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ai_app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy